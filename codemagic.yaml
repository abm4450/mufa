# جذر المستودع = مجلد ios (افتح Mufa.xcodeproj من هنا).
# التوقيع وتوزيع IPA خارج هذا المستودع.
workflows:
  ios-workflow:
    name: Mufa iOS (Simulator build check)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    # بدون هذا القسم يظهر "No artifacts were found" — نرفع حزمة محاكي + نسخة Info للتحقق من API.
    artifacts:
      - Mufa-simulator.zip
      - build-info/API_BASE_URL.txt
    scripts:
      - name: Build for iOS Simulator
        script: |
          #!/bin/sh
          set -eu
          # generic/platform=iOS Simulator يجبر Xcode على بناء arm64 و x86_64 معاً؛ شريحة x86_64 تفشل على مضيف Apple Silicon.
          SIM_UDID="$(python3 <<'PY'
          import json, subprocess
          j = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"], text=True
          ))
          def udid_order():
              for runtime, devs in j.get("devices", {}).items():
                  if "iOS" not in runtime:
                      continue
                  for d in devs:
                      if d.get("isAvailable") and d.get("udid"):
                          if "iPhone" in (d.get("name") or ""):
                              yield d["udid"]
              for runtime, devs in j.get("devices", {}).items():
                  if "iOS" not in runtime:
                      continue
                  for d in devs:
                      if d.get("isAvailable") and d.get("udid"):
                          yield d["udid"]
          u = next(udid_order(), None)
          if not u:
              raise SystemExit("no available iOS Simulator")
          print(u)
          PY
          )"
          echo "Building for simulator id=$SIM_UDID"
          xcodebuild \
            -project Mufa.xcodeproj \
            -scheme Mufa \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_UDID" \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            'EXCLUDED_ARCHS[sdk=iphonesimulator*]'=x86_64 \
            build
          APP="$CM_BUILD_DIR/DerivedData/Build/Products/Debug-iphonesimulator/Mufa.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: expected app at $APP"
            exit 1
          fi
          mkdir -p build-info
          API_VAL="$(/usr/libexec/PlistBuddy -c 'Print :API_BASE_URL' "$APP/Info.plist" 2>/dev/null || true)"
          echo "$API_VAL" > build-info/API_BASE_URL.txt
          echo "----- API_BASE_URL في الـ bundle (Info.plist) -----"
          cat build-info/API_BASE_URL.txt
          echo "-----"
          (cd "$(dirname "$APP")" && zip -qr "$CM_BUILD_DIR/Mufa-simulator.zip" "$(basename "$APP")")
          echo "Artifact: Mufa-simulator.zip ($(du -h "$CM_BUILD_DIR/Mufa-simulator.zip" | cut -f1))"
