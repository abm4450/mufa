# جذر المستودع = مجلد ios.
#
# ─── ios-ipa-unsigned ───
# يُنتج Mufa.ipa بدون توقيع جاهز للتوقيع في Sideloadly.

workflows:
  ios-ipa-unsigned:
    name: Mufa iOS (IPA — للتوقيع في Sideloadly)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest

    scripts:
      - name: عرض API_BASE_URL (Release)
        script: |
          #!/bin/sh
          set -eu
          xcodebuild -project Mufa.xcodeproj \
            -scheme Mufa \
            -configuration Release \
            -showBuildSettings 2>/dev/null \
            | grep -E "^\s*(API_BASE_URL|PRODUCT_BUNDLE_IDENTIFIER)\s*=" || true

      - name: Archive وتجميع IPA بدون توقيع
        script: |
          #!/bin/sh
          set -eu

          ARCHIVE="$CM_BUILD_DIR/Mufa.xcarchive"
          EXPORT_DIR="$CM_BUILD_DIR/export"

          # Archive بدون توقيع
          xcodebuild archive \
            -project Mufa.xcodeproj \
            -scheme Mufa \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE" \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=""

          # تجميع IPA يدوياً من الـ .app داخل الأرشيف
          APP_PATH=$(find "$ARCHIVE" -name "*.app" | head -1)
          mkdir -p "$EXPORT_DIR/Payload"
          cp -r "$APP_PATH" "$EXPORT_DIR/Payload/"
          cd "$EXPORT_DIR"
          zip -r "Mufa.ipa" Payload/
          ls -la "$EXPORT_DIR/Mufa.ipa"

    artifacts:
      - $CM_BUILD_DIR/export/Mufa.ipa

  ios-simulator:
    name: Mufa iOS (فحص محاكي)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest

    scripts:
      - name: Build for iOS Simulator
        script: |
          #!/bin/sh
          set -eu
          SIM_UDID="$(python3 <<'PY'
          import json, subprocess
          j = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"], text=True
          ))
          def udid_order():
              for runtime, devs in j.get("devices", {}).items():
                  if "iOS" not in runtime:
                      continue
                  for d in devs:
                      if d.get("isAvailable") and d.get("udid"):
                          if "iPhone" in (d.get("name") or ""):
                              yield d["udid"]
              for runtime, devs in j.get("devices", {}).items():
                  if "iOS" not in runtime:
                      continue
                  for d in devs:
                      if d.get("isAvailable") and d.get("udid"):
                          yield d["udid"]
          u = next(udid_order(), None)
          if not u:
              raise SystemExit("no available iOS Simulator")
          print(u)
          PY
          )"
          echo "Building for simulator id=$SIM_UDID"
          xcodebuild \
            -project Mufa.xcodeproj \
            -scheme Mufa \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_UDID" \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            'EXCLUDED_ARCHS[sdk=iphonesimulator*]'=x86_64 \
            build
