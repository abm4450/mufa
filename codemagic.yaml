# جذر المستودع = مجلد ios (افتح Mufa.xcodeproj من هنا).
# التوقيع وتوزيع IPA خارج هذا المستودع.
workflows:
  ios-workflow:
    name: Mufa iOS (Simulator build check)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build for iOS Simulator
        script: |
          #!/bin/sh
          set -e
          xcodebuild \
            -project Mufa.xcodeproj \
            -scheme Mufa \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            build
