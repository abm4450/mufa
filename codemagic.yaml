# جذر المستودع = مجلد ios.
#
# ─── ios-archive ───
# يُنتج Mufa.xcarchive.zip بدون توقيع توزيع على Codemagic.
# التوقيع وإخراج IPA يتم لاحقاً عندك (Xcode → Organizer → Distribute، أو xcodebuild -exportArchive).

workflows:
  ios-archive:
    name: Mufa iOS (أرشيف — توقيع خارجي)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: عرض API_BASE_URL (Release)
        script: |
          #!/bin/sh
          set -eu
          xcodebuild -project Mufa.xcodeproj -scheme Mufa -configuration Release -showBuildSettings 2>/dev/null | grep -E "^\s*API_BASE_URL\s*=" || true
      - name: Archive بدون توقيع (للتوقيع لاحقاً)
        script: |
          #!/bin/sh
          set -eu
          ARCHIVE="$CM_BUILD_DIR/Mufa.xcarchive"
          rm -rf "$ARCHIVE"
          xcodebuild archive \
            -project Mufa.xcodeproj \
            -scheme Mufa \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE" \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual
          ditto -c -k --sequesterRsrc --keepParent "$ARCHIVE" "$CM_BUILD_DIR/Mufa.xcarchive.zip"
          ls -la "$CM_BUILD_DIR/Mufa.xcarchive.zip"
    artifacts:
      - Mufa.xcarchive.zip

  ios-simulator:
    name: Mufa iOS (فحص محاكي)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build for iOS Simulator
        script: |
          #!/bin/sh
          set -eu
          SIM_UDID="$(python3 <<'PY'
          import json, subprocess
          j = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"], text=True
          ))
          def udid_order():
              for runtime, devs in j.get("devices", {}).items():
                  if "iOS" not in runtime:
                      continue
                  for d in devs:
                      if d.get("isAvailable") and d.get("udid"):
                          if "iPhone" in (d.get("name") or ""):
                              yield d["udid"]
              for runtime, devs in j.get("devices", {}).items():
                  if "iOS" not in runtime:
                      continue
                  for d in devs:
                      if d.get("isAvailable") and d.get("udid"):
                          yield d["udid"]
          u = next(udid_order(), None)
          if not u:
              raise SystemExit("no available iOS Simulator")
          print(u)
          PY
          )"
          echo "Building for simulator id=$SIM_UDID"
          xcodebuild \
            -project Mufa.xcodeproj \
            -scheme Mufa \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_UDID" \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            'EXCLUDED_ARCHS[sdk=iphonesimulator*]'=x86_64 \
            build
